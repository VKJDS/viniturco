<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>vini†</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: url("3.gif") no-repeat center center fixed;
    background-size: cover;
    color: white;
    font-family: 'Poppins', sans-serif;
    text-align: center;
    overflow: hidden;

    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: -1;
}

#enter {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url("4.gif") no-repeat center center;
    background-size: cover;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    cursor: pointer;
    z-index: 10;
    transition: opacity 1s ease;
}

#enter::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
}

#enter span {
    position: relative;
    z-index: 2;
    color: white;
    text-shadow: 0 0 15px #ffffff;
    font-weight: bold;
}

.container {
    position: relative;
}

img {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: 3px solid #ffffff;
    box-shadow: 0 0 25px #ffffff;
}

h1 {
    font-size: 55px;
    margin: 15px 0 5px 0;
    color: #ffffff;
    text-shadow: 0 0 20px #ffffff;
    letter-spacing: 3px;
}

.subtitle {
    font-size: 16px;
    color: rgba(255,255,255,0.75);
    margin-bottom: 15px;
    text-shadow: 0 0 10px rgba(255,255,255,0.4);
}

.links a {
    display: inline-block;
    margin: 10px;
    padding: 12px 25px;
    background: rgba(0, 0, 0, 0.15);
    border: 1px solid #ffffff;
    border-radius: 12px;
    color: #ffffff;
    text-decoration: none;
    transition: 0.3s;
}

.links a:hover {
    background: #ffffff;
    color: black;
    box-shadow: 0 0 15px #ffffff;
}

button {
    position: fixed;
    top: 20px;
    left: 20px;
    padding: 8px 14px;
    background: rgba(0,0,0,0.35);
    border: none;
    color: #ffffff;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.25s;
    backdrop-filter: blur(6px);
    z-index: 20;
}

button:hover {
    background: rgba(255,255,255,0.15);
}
</style>
</head>

<body>

<div id="enter"><span>Click to enter...</span></div>

<audio id="music" autoplay>
  <source src="1.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <img src="2.gif">
    <h1>Vini†</h1>
    <div class="subtitle">Você faz suas escolhas e suas escolhas fazem você...</div>

    <div class="links">
        <a href="https://open.spotify.com/user/3tm9gqu5xxo01jk2vjw8lo4l4" target="_blank">Spotify</a>
        <a href="https://www.youtube.com/@vknevida" target="_blank">YouTube</a>
    </div>
</div>

<button id="muteBtn" onclick="toggleMusic()">🔊</button>

<script>
const enterScreen = document.getElementById("enter");
const music = document.getElementById("music");
const muteBtn = document.getElementById("muteBtn");

enterScreen.addEventListener("click", function(){
    music.play();
    enterScreen.style.opacity = "0";
    setTimeout(() => { enterScreen.style.display = "none"; }, 1000);
});

function toggleMusic(){
    if(music.paused){
        music.play();
        muteBtn.textContent = "🔊";
    } else {
        music.pause();
        muteBtn.textContent = "🔇";
    }
}
</script>

</body>
</html>
